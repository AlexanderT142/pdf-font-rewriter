name: Build Obsidian plugin

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "obsidian-plugin/**"
      - ".github/workflows/build-obsidian-plugin.yml"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "obsidian-plugin/**"
      - ".github/workflows/build-obsidian-plugin.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            obsidian-plugin/package-lock.json

      - name: Install root scanner dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck root scanner entrypoint
        run: npm run typecheck:obsidian-root

      - name: Install dependencies
        working-directory: obsidian-plugin
        run: npm ci

      - name: Build plugin
        working-directory: obsidian-plugin
        run: npm run build

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: |
            obsidian-plugin/main.js
            obsidian-plugin/manifest.json
            obsidian-plugin/styles.css
